<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Course Organizer - Home</title>
  <link rel="stylesheet" href="index2.css">
</head>
<body>
    <header>
     <h1>Add a new course</h1>
    <nav>
    <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index2.html">My Courses</a></li>
            <li><a href="index3.html">Add Course</a></li>
            <li><a href="index4.html">Contact Us</a></li>
    </ul>
    </nav>
    </header>
    <main>
        <section>
            <form>
                <label for="coursname">Course Name:</label>
                <input type="text" id="coursname" name="coursename" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="credits">Credit Hours:</label>
                <input type="number" id="credits" name="credits" min="1" max="6" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes"></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>
    <footer>
        <p> 2026 Personal Course Organizer</p>
    </footer>
</body>
</html>
